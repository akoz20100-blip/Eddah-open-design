<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f7a37" />
  <title>PSMMC — Pharmacy Stock &amp; Reorder Analytics</title>
  <link rel="icon" href="./assets/psmmc-crest.svg" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="appbar">
    <div class="brand">
      <span class="brand-logo">
        <img src="./assets/psmmc-logo.png" alt="PSMMC" onerror="this.onerror=null;this.src='./assets/psmmc-crest.svg'"/>
      </span>
      <span class="brand-text">
        <strong id="tTitle">تحليلات مخزون الصيدلية وإعادة الطلب</strong>
        <small id="tSub">مدينة الأمير سلطان الطبية العسكرية · الخدمات الطبية</small>
      </span>
    </div>
    <div class="brand-meta" id="brandMeta">
      <span class="meta-chip" id="metaPeriod">—</span>
      <span class="meta-chip" id="metaStock">—</span>
      <button class="btn btn-ghost lang" id="langBtn" type="button">EN</button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab is-active" data-view="planning" role="tab"><span class="tab-ico">📋</span><span class="tab-lbl" data-i18n="tab_planning"></span></button>
    <button class="tab" data-view="management" role="tab"><span class="tab-ico">🏛️</span><span class="tab-lbl" data-i18n="tab_management"></span></button>
  </nav>

  <section class="uploadbar card">
    <div class="upl">
      <label class="filebtn" id="lblWd">
        <input type="file" id="fileWithdrawals" accept=".xlsx,.xls" hidden />
        <span class="filebtn-ico">⬆</span>
        <span class="filebtn-txt"><b data-i18n="file_wd"></b><i id="wdName" data-i18n="file_wd_hint"></i></span>
      </label>
      <label class="filebtn" id="lblSt">
        <input type="file" id="fileStock" accept=".xlsx,.xls" hidden />
        <span class="filebtn-ico">⬆</span>
        <span class="filebtn-txt"><b data-i18n="file_st"></b><i id="stName" data-i18n="file_st_hint"></i></span>
      </label>
    </div>
    <div class="upl-actions">
      <button id="btnSample" class="btn btn-ghost" type="button" data-i18n="btn_sample"></button>
      <button id="btnExport" class="btn btn-primary" type="button" disabled data-i18n="btn_export"></button>
    </div>
    <p class="upl-hint" id="uplHint"></p>
  </section>

  <main id="content" class="content">
    <div class="empty card" id="emptyState">
      <div class="empty-ico">📊</div>
      <h2 data-i18n="empty_title"></h2>
      <p data-i18n="empty_text"></p>
      <button class="btn btn-primary" type="button" data-i18n="empty_btn" onclick="document.getElementById('btnSample').click()"></button>
    </div>
  </main>

  <footer class="foot" id="foot"></footer>

  <div class="toast" id="toast" hidden></div>

  <script src="./vendor/xlsx.full.min.js"></script>
  <script src="./sample-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
