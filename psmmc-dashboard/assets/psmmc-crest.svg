<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="PSMMC — Medical Services emblem">
  <defs>
    <radialGradient id="ringG" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#2f9e54"/>
      <stop offset="100%" stop-color="#0f7a37"/>
    </radialGradient>
  </defs>
  <!-- outer thin ring -->
  <circle cx="100" cy="100" r="96" fill="#ffffff" stroke="#0f7a37" stroke-width="2"/>
  <!-- laurel wreath ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="url(#ringG)" stroke-width="13" stroke-dasharray="3 5" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="76" fill="#ffffff"/>
  <!-- red crescent opening right -->
  <path d="M118 44a64 64 0 1 0 0 112 52 52 0 1 1 0-112z" fill="#d3262b"/>
  <!-- central white disc with Saudi palm + crossed swords -->
  <circle cx="108" cy="100" r="34" fill="#ffffff" stroke="#0f7a37" stroke-width="1.5"/>
  <!-- crossed swords -->
  <g stroke="#0f7a37" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M90 120 L126 92"/>
    <path d="M126 120 L90 92"/>
  </g>
  <!-- palm tree -->
  <g fill="#0f7a37">
    <rect x="106.5" y="92" width="3" height="20" rx="1.5"/>
    <path d="M108 92c-9-6-16-4-20-1 6-1 13 0 20 4zM108 92c9-6 16-4 20-1-6-1-13 0-20 4zM108 90c-6-8-5-15-2-19-1 6 0 12 2 19zM108 90c6-8 5-15 2-19 1 6 0 12-2 19z"/>
  </g>
  <!-- green banner ribbon -->
  <path d="M28 150 q72 30 144 0 l-8 22 q-64 22 -128 0 z" fill="#0f7a37"/>
  <text x="100" y="171" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="11" fill="#ffffff" font-weight="bold">الخدمات الطبية</text>
</svg>
