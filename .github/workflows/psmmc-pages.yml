name: Deploy PSMMC Dashboard to Pages

# Publishes only the self-contained PSMMC NUPCO stock dashboard
# (psmmc-dashboard/) to GitHub Pages. Nothing else from the repo is published.

on:
  push:
    branches:
      - claude/psmmc-logo-stock-analytics-REFJO
    paths:
      - psmmc-dashboard/**
      - .github/workflows/psmmc-pages.yml
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: psmmc-dashboard
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
